# Render.com deployment configuration
# This file enables one-click deployment to Render

services:
  # FastAPI Application
  - type: web
    name: talentree-api
    env: docker
    region: frankfurt
    plan: free
    branch: feature/admin-dashboard
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MOCK_DATA_PATH
        value: /app/mock_data
      - key: AI_MODELS_PATH
        value: /app/ai_models
      - key: PORT
        value: 8000
    healthCheckPath: /health
