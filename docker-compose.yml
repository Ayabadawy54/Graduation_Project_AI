version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: talentree-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: talentree
      POSTGRES_USER: talentree_user
      POSTGRES_PASSWORD: talentree_password_2026
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U talentree_user -d talentree" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talentree-network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talentree-api
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://talentree_user:talentree_password_2026@postgres:5432/talentree

      # API Settings
      API_TITLE: TalentTree Admin Dashboard API
      API_VERSION: 4.0.0
      ENVIRONMENT: development

      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080

      # Paths
      MOCK_DATA_PATH: /app/mock_data
      AI_MODELS_PATH: /app/ai_models
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/docs" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - talentree-network

  # Jupyter Notebooks Server
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: talentree-jupyter
    restart: unless-stopped
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./mock_data:/home/jovyan/work/mock_data
      - ./ai_models:/home/jovyan/work/ai_models
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
    networks:
      - talentree-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: talentree-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - talentree-network

  # Redis Cache (Optional - for future use)
  redis:
    image: redis:7-alpine
    container_name: talentree-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talentree-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  talentree-network:
    driver: bridge
